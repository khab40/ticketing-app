name: tests-orders

on:
  pull_request:
    paths:
      - "orders/**"
      - ".github/workflows/tests-orders.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: orders
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: orders/package-lock.json
      - run: npm ci
      - run: npm run test:ci
