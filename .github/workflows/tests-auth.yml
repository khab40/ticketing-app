name: tests-auth

on: 
  pull_request:
    paths:
      - 'auth/**'
  
permissions:
  contents: read

jobs: 
  build: 
    runs-on: ubuntu-latest
    steps: 
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
      - run: cd auth && npm install && npm run test:ci
