name: tests-payments

on: 
  pull_request:
    paths:
      - 'payments/**'
  
permissions:
  contents: read

jobs: 
  build: 
    runs-on: ubuntu-latest
    steps: 
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
      - run: cd payments && npm install && npm run test:ci
